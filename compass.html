<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stdby Compass — A380 Flight Deck</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1e1e24; color: #e2e8f0;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .back-link { align-self: flex-start; color: #38bdf8; text-decoration: none; font-weight: bold; margin-bottom: 20px; }
        .back-link:hover { text-decoration: underline; }
        h1 { color: #ffffff; margin-bottom: 5px; }
        .subtitle { color: #94a3b8; margin-bottom: 25px; }
        .image-container {
            max-width: 100%; border: 3px solid #374151;
            border-radius: 6px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden; margin-bottom: 35px;
        }
        img { max-width: 100%; height: auto; display: block; }
          .panel-zone {
            position: absolute;
            background: rgba(100, 116, 139, 0.18);
            border: 1.5px solid rgba(148, 163, 184, 0.45);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4px;
            overflow: hidden;
        }
         .placeholder {
         width: 500px; max-width: 100%; height: 450px;
        background: #2d3748; display: flex; align-items: center;
       justify-content: center; color: #94a3b8; font-size: 1em;
     border-radius: 6px; margin-bottom: 35px;
         }
        .panel-zone:hover {
            background: rgba(56, 189, 248, 0.22);
            border-color: #38bdf8;
        }
        .panel-zone .zone-label {
            color: rgba(255,255,255,0.9);
            font-size: 0.6em;
            font-weight: 600;
            line-height: 1.3;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
        }
        .panel-zone .zone-fin {
            color: #fbbf24;
            font-size: 0.52em;
            font-family: monospace;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
            margin-top: 2px;
        }

      
    }
         /* ── ZONE COORDINATES (image: 659 x 449 px) ── */
        #zone-compass      { top: 26%;   left: 5.5%;   width: 26%;  height: 25%; }

        .overlay-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 99;
        }
        .popup-box {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1f2937;
            border: 2px solid #38bdf8;
            padding: 22px 25px;
            border-radius: 8px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.9);
            z-index: 100;
            width: 92%; max-width: 420px;
        }
        .popup-box h3 { margin: 0 0 12px 0; color: #38bdf8; font-size: 1em; padding-right: 30px; }
        .popup-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 0.85em; }
        .popup-row .label { color: #94a3b8; min-width: 40px; }
        .popup-row .value { font-family: monospace; color: #f97316; }
        .popup-row .value.sn { color: #a3e635; }
        .popup-divider { border: none; border-top: 1px solid #374151; margin: 12px 0; }
        .popup-contents { font-size: 0.82em; color: #cbd5e1; line-height: 1.6; }
        .popup-contents strong { color: #fbbf24; }
        .close-btn {
            position: absolute; top: 12px; right: 12px;
            background: #374151; color: white; border: none;
            padding: 4px 9px; cursor: pointer; border-radius: 4px; font-size: 0.85em;
        }
        .close-btn:hover { background: #ef4444; }

        .parts-section { width: 100%; max-width: 900px; }
        .parts-section h2 { color: #38bdf8; border-bottom: 2px solid #374151; padding-bottom: 10px; }
        .search-box {
            width: 100%; padding: 10px; margin-bottom: 15px;
            background: #1f2937; border: 1px solid #374151;
            border-radius: 6px; color: #f3f4f6; font-size: 0.9em;
        }
        .search-box:focus { outline: none; border-color: #38bdf8; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        thead tr { background: #1a202c; color: #38bdf8; text-align: left; }
        th { padding: 12px 15px; border-bottom: 2px solid #38bdf8; }
        td { padding: 10px 15px; border-bottom: 1px solid #374151; }
        tbody tr:nth-child(even) { background: #1f2937; }
        tbody tr:hover { background: #263348; }
        .pn { font-family: monospace; color: #f97316; }
        .sn { font-family: monospace; color: #a3e635; }
        .na { color: #6b7280; font-style: italic; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Full Cockpit</a>
    <h1>Stdby Compass &amp; Eye Reference</h1>
    <p class="subtitle">Backup mechanical compass and pilot seat alignment indicator.</p>

    <div class="image-container">
        <img src="compass.jpg" alt="Stdby Compass Close-Up">

                <div class="panel-zone" id="zone-compass" onclick="showPopup('compass')">
            <div class="zone-label">COMPASS</div>
            <div class="zone-fin">-</div>
    </div>
  </div>

    <div id="dark-screen" class="overlay-screen" onclick="closeAllPopups()"></div>

     <!-- RAMP Capt -->
    <div id="popup-compass" class="popup-box">
        <button class="close-btn" onclick="closeAllPopups()">✕</button>
        <h3>COMPASS</h3>
        <div class="popup-row"><span class="label">P/N</span><span class="value">XXX</span></div>
        <div class="popup-row"><span class="label">S/N</span><span class="value sn">XXX</span></div>
        <hr class="popup-divider">
        <div class="popup-contents">
            <strong>COMPASS</strong>. Contains <strong>used as a reerance fo the pilots</strong>  for the Captain & FO.
        </div>
    </div>

    <p style="color:#94a3b8; margin-top: 10px;">No need for a part index here.</p>
</body>
</html>
